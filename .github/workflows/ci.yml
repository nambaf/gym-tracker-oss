name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build (Next.js)
        # Provide the env vars the build expects so we exercise the same code path
        # production uses. They are placeholder values — the build never hits AWS.
        run: npm run build
        env:
          APP_AWS_REGION: eu-south-1
          APP_NAME: gym-tracker
          ENVIRONMENT: ci
          COGNITO_USER_POOL_ID: us-east-1_ciplaceholder
          COGNITO_CLIENT_ID: ciplaceholder
          OWNER_EMAIL: ci@example.com
          DYNAMO_TABLE_EXERCISES: gym-tracker-exercises-ci
          DYNAMO_TABLE_SESSIONS: gym-tracker-sessions-ci
          DYNAMO_TABLE_SETS: gym-tracker-sets-ci
          DYNAMO_TABLE_PLANS: gym-tracker-plans-ci
          DYNAMO_TABLE_SETTINGS: gym-tracker-settings-ci
          AI_PROVIDER: 'off'
          DEFAULT_LANG: it
          NODE_ENV: production
