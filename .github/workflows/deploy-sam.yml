name: Deploy SAM stack

# Deploys the AWS SAM template (DynamoDB tables + Cognito User Pool).
# Runs only when explicitly invoked from the Actions tab — there is no
# auto-trigger on push, because changing IAM/auth resources should be a
# deliberate action.
#
# This job INTENTIONALLY does not touch Amplify environment variables.
# After a successful deploy, copy the values from the SAM stack's
# `EnvironmentVariables` output into the Amplify console manually (one-off).
#
# Required setup in the AWS account (one-off, see README):
#   - An IAM role with permissions to update the SAM stack
#     (CloudFormation, DynamoDB, Cognito).
#   - The role's trust policy must allow `sts:AssumeRoleWithWebIdentity` from
#     this GitHub repo via OIDC (token.actions.githubusercontent.com).
#
# Required repository secrets:
#   AWS_DEPLOY_ROLE_ARN        — the IAM role ARN to assume.
#   AWS_DEPLOY_REGION          — region to deploy into (e.g. eu-south-1).
#   SAM_STACK_NAME             — CloudFormation stack name.
#   SAM_OWNER_EMAIL            — Cognito owner email parameter.
#
# Required repository variables (non-secret, optional):
#   SAM_APP_NAME               — defaults to "gym-tracker".
#   SAM_ENVIRONMENT            — defaults to "dev".

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment suffix (dev | staging | prod)'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (SAM CLI dependency)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEPLOY_REGION }}

      - name: SAM build
        run: sam build --use-container

      - name: SAM deploy
        env:
          APP_NAME: ${{ vars.SAM_APP_NAME || 'gym-tracker' }}
          ENVIRONMENT: ${{ inputs.environment }}
          OWNER_EMAIL: ${{ secrets.SAM_OWNER_EMAIL }}
        run: |
          sam deploy \
            --stack-name "${{ secrets.SAM_STACK_NAME }}" \
            --region "${{ secrets.AWS_DEPLOY_REGION }}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --parameter-overrides \
              "AppName=${APP_NAME}" \
              "Environment=${ENVIRONMENT}" \
              "OwnerEmail=${OWNER_EMAIL}"

      - name: Output stack values
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ secrets.SAM_STACK_NAME }}" \
            --region "${{ secrets.AWS_DEPLOY_REGION }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`EnvironmentVariables`].OutputValue' \
            --output text
          echo
          echo "Copy the values above into the Amplify console under"
          echo "App settings → Environment variables, then trigger an Amplify build."
