version: 1

# ─────────────────────────────────────────────────────────────────────────────
# Amplify Hosting build pipeline.
#
# Required env vars in the Amplify console (App settings → Environment variables):
#   - APP_AWS_REGION
#   - APP_NAME, ENVIRONMENT          (derive DynamoDB table names)
#   - COGNITO_USER_POOL_ID, COGNITO_CLIENT_ID
#   - AI_PROVIDER (+ matching provider credentials below)
#
# Optional, provider-specific (set only those you use):
#   BEDROCK_REGION, BEDROCK_MODEL_ID
#   GEMINI_API_KEY, GEMINI_MODEL
#   OPENAI_API_KEY, OPENAI_MODEL
#   ANTHROPIC_API_KEY, ANTHROPIC_MODEL
# ─────────────────────────────────────────────────────────────────────────────

frontend:
  phases:
    preBuild:
      commands:
        - rm -f /root/.nvm/default-packages
        - nvm install
        - nvm use
        - node -v && npm -v
        - npm ci --prefer-offline --no-audit --no-fund
    build:
      commands:
        - export ENVIRONMENT="${ENVIRONMENT:-dev}"
        - export APP_NAME="${APP_NAME:-gym-tracker}"
        - export AI_PROVIDER="${AI_PROVIDER:-off}"
        - export DEFAULT_LANG="${DEFAULT_LANG:-it}"
        - |
          cat > .env.production <<EOF
          # generated by Amplify build — do not edit
          APP_AWS_REGION=${APP_AWS_REGION}
          APP_NAME=${APP_NAME}
          ENVIRONMENT=${ENVIRONMENT}
          DYNAMO_TABLE_EXERCISES=${APP_NAME}-exercises-${ENVIRONMENT}
          DYNAMO_TABLE_SESSIONS=${APP_NAME}-sessions-${ENVIRONMENT}
          DYNAMO_TABLE_SETS=${APP_NAME}-sets-${ENVIRONMENT}
          DYNAMO_TABLE_PLANS=${APP_NAME}-plans-${ENVIRONMENT}
          DYNAMO_TABLE_SETTINGS=${APP_NAME}-settings-${ENVIRONMENT}
          COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
          COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
          AI_PROVIDER=${AI_PROVIDER}
          BEDROCK_REGION=${BEDROCK_REGION}
          BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GEMINI_MODEL=${GEMINI_MODEL}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODEL=${OPENAI_MODEL}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
          DEFAULT_LANG=${DEFAULT_LANG}
          EOF
        - |
          echo "== Effective build variables (secrets hidden) =="
          grep -E '^(APP_AWS_REGION|APP_NAME|ENVIRONMENT|DYNAMO_TABLE_|COGNITO_USER_POOL_ID|COGNITO_CLIENT_ID|AI_PROVIDER|DEFAULT_LANG)=' .env.production || true
        - npm run build

  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - .npm/**/*
